app:
  title: Backstage Developer Portal
  # baseUrl is overridden by APP_BASE_URL env var at deploy time
  baseUrl: ${APP_BASE_URL}

backend:
  baseUrl: ${BACKEND_BASE_URL}
  # Bind to all interfaces for LoadBalancer / external access
  listen:
    port: 7007
    host: 0.0.0.0

  # Disable upgrade-insecure-requests since we serve over plain HTTP
  csp:
    upgrade-insecure-requests: false

  # config options: https://node-postgres.com/apis/client
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      database: ${POSTGRES_DB}

  auth:
    dangerouslyDisableDefaultAuthPolicy: false

auth:
  environment: production
  providers:
    guest: {}
    #github:
      #production:
        #clientId: ${AUTH_GITHUB_CLIENT_ID}
        #clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}
        #signIn:
          #resolvers:
            #- resolver: usernameMatchingUserEntityName

catalog:
  locations:
    - type: file
      target: ./examples/entities.yaml
    - type: file
      target: ./examples/template/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ./examples/org.yaml
      rules:
        - allow: [User, Group]
