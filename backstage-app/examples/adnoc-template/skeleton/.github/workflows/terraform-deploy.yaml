name: Deploy Infrastructure & App to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  terraform-and-deploy:
    name: Provision Azure Web App & Deploy Angular
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID: ${{ '${{' }} secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ '${{' }} secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ '${{' }} secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ '${{' }} secrets.AZURE_TENANT_ID }}
      TF_WORKING_DIR: './terraform'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- Infrastructure Provisioning ---
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve

      - name: Get Web App Name from Terraform
        id: terraform-output
        working-directory: ./terraform
        run: |
          APP_NAME=$(terraform output -raw webapp_name)
          echo "webapp_name=$APP_NAME" >> $GITHUB_OUTPUT

      # --- Application Build & Deploy ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './src/package-lock.json'

      - name: Install Dependencies & Build Angular App
        working-directory: ./src
        run: |
          npm ci
          npm run build -- --configuration production

      - name: Log in to Azure CLI
        uses: azure/login@v2
        with:
          client-id: ${{ '${{' }} secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ '${{' }} secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ '${{' }} secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ '${{' }} secrets.AZURE_CLIENT_SECRET }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ '${{' }} steps.terraform-output.outputs.webapp_name }}
          package: './src/dist/demo-app/browser'
