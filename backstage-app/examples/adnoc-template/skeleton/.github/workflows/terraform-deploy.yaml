name: Deploy Infrastructure & App to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  terraform-and-deploy:
    name: Provision Azure Web App & Deploy Angular
    runs-on: ubuntu-latest
    
    permissions:
      contents: read

    env:
      ARM_CLIENT_ID: ${{ '${{' }} secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ '${{' }} secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ '${{' }} secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ '${{' }} secrets.AZURE_TENANT_ID }}
      TF_WORKING_DIR: './terraform'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- Infrastructure Provisioning ---
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve

      - name: Get Web App Name from Terraform
        id: terraform-output
        working-directory: ./terraform
        run: |
          APP_NAME=$(terraform output -raw webapp_name)
          echo "webapp_name=$APP_NAME" >> $GITHUB_OUTPUT

      # --- Application Build & Deploy ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies & Build Angular App
        working-directory: ./src
        run: |
          npm install
          npm run build -- --configuration production

      - name: Prepare Deployment Package
        working-directory: ./src
        run: |
          mkdir -p ../deploy
          cp package.json ../deploy/
          cp server.js ../deploy/
          cp -r dist ../deploy/
          cd ../deploy
          npm install --production

      - name: Log in to Azure CLI
        uses: azure/login@v3
        with:
          creds: ${{ '${{' }} format('{{"clientId":"{0}","clientSecret":"{1}","subscriptionId":"{2}","tenantId":"{3}"}}', secrets.AZURE_CLIENT_ID, secrets.AZURE_CLIENT_SECRET, secrets.AZURE_SUBSCRIPTION_ID, secrets.AZURE_TENANT_ID) }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ '${{' }} steps.terraform-output.outputs.webapp_name }}
          package: './deploy'
