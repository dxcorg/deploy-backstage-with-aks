name: Deploy Infrastructure & App to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  terraform-and-deploy:
    name: Provision Azure Web App & Deploy Angular
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TF_WORKING_DIR: './terraform'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- Infrastructure Provisioning ---
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve

      # --- Application Build & Deploy ---
      - name: Setup Node.js (v24 LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: './src/package-lock.json'

      - name: Install Dependencies & Build Angular App
        working-directory: ./src
        run: |
          npm ci
          npm run build -- --configuration production

      - name: Log in to Azure CLI
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: '${{ values.webAppName }}'
          package: './src/dist/demo-app/browser'
