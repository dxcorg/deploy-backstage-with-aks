apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  # Force lowercase and replace spaces with hyphens to guarantee schema compliance
  name: ${{ values.name | lower | replace(" ", "-") }}
  description: ${{ values.description }}
  tags:
    - azure
    - vm
    - infrastructure
    - terraform
    - ${{ values.location | lower | replace(" ", "-") }}
    - ${{ values.osImage | lower | replace(" ", "-") }}
  links:
    - url: https://dev.azure.com/${{ values.organization }}/${{ values.project }}/_build?definitionId=${{ values.pipelineId }}
      title: Azure DevOps Provisioning Pipeline
      icon: dashboard
  annotations:
    backstage.io/techdocs-ref: dir:.
    
spec:
  type: virtual-machine
  # Ensure the owner maps to a valid reference structure
  owner: ${{ values.owner | lower | replace(" ", "-") }}
  system: azure-infrastructure